<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Gold left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#c9a84c"/>

  <!-- Subtle gold diagonal accent -->
  <polygon points="0,0 120,0 0,120" fill="#c9a84c" opacity="0.07"/>

  <!-- Bottom-right decorative corner -->
  <polygon points="1200,630 1080,630 1200,510" fill="#c9a84c" opacity="0.07"/>

  <!-- Logo: DEV(branco) + MR(dourado) + MORAES(branco) em um único texto para espaçamento perfeito -->
  <text x="80" y="275"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="100"
    font-weight="900"
    letter-spacing="2">
    <tspan fill="#e8e8e8">DEV</tspan><tspan fill="#c9a84c">MR</tspan><tspan fill="#e8e8e8">MORAES</tspan>
  </text>

  <!-- Divider line -->
  <rect x="80" y="305" width="520" height="2" fill="#c9a84c" opacity="0.6"/>

  <!-- Tagline -->
  <text x="80" y="358"
    font-family="Arial, sans-serif"
    font-size="29"
    font-weight="400"
    fill="#aaaaaa"
    letter-spacing="0.5">Desenvolvedor Freelancer · Atendimento em todo o Brasil</text>

  <!-- Services -->
  <text x="80" y="415"
    font-family="Arial, sans-serif"
    font-size="21"
    fill="#666666">Sites Profissionais · Sistemas C# · Apps Mobile · Chatbots IA · Automação</text>

  <!-- CTA -->
  <rect x="80" y="468" width="494" height="50" rx="25" fill="#c9a84c" fill-opacity="0.1" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="100" y="501"
    font-family="Arial, sans-serif"
    font-size="21"
    fill="#c9a84c"
    letter-spacing="0.3">maxcanoas.github.io/devmrmoraes</text>
</svg>
